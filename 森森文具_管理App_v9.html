<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="森森管理">
<title>森森文具玩具 管理系統</title>
<style>
:root{
  --pu:#534AB7;--pul:#EEEDFE;--pud:#3C3489;
  --te:#1D9E75;--tel:#E1F5EE;--ted:#085041;
  --am:#BA7517;--aml:#FAEEDA;--amd:#633806;
  --co:#D85A30;--col:#FAECE7;--cod:#712B13;
  --gr:#639922;--grl:#EAF3DE;--grd:#27500A;
  --gy:#888780;--gyl:#F1EFE8;--gyd:#444441;
  --re:#E24B4A;--rel:#FCEBEB;--red:#791F1F;
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --tx:#1a1a18;--tx2:#5f5e5a;--tx3:#9e9d99;
  --bd:#e8e7e3;--bd2:#d3d1c7;--r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg3);color:var(--tx);font-size:15px}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg3);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--bg);border-radius:16px;border:1px solid var(--bd);padding:2rem;width:320px;max-width:90vw;text-align:center}
.login-box input{width:100%;padding:11px 14px;border-radius:var(--rs);border:1px solid var(--bd2);font-size:14px;margin-bottom:10px;background:var(--bg);color:var(--tx)}

/* TOPBAR */
.topbar{background:var(--bg);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.user-badge{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--tx2)}
.role-tag{font-size:11px;padding:2px 8px;border-radius:99px}
.role-admin{background:var(--pul);color:var(--pud)}
.role-staff{background:var(--gyl);color:var(--gyd)}

/* TABBAR */
.tabbar{display:flex;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--bd);position:sticky;top:57px;z-index:99;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;font-size:12px;color:var(--tx3);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--pu);border-bottom-color:var(--pu);font-weight:500}

/* PANELS */
.panel{display:none;padding:14px 16px 80px}
.panel.active{display:block}
.card{background:var(--bg);border-radius:var(--r);border:1px solid var(--bd);padding:14px;margin-bottom:12px}
.ctitle{font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:10px}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.metric{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px}
.mlabel{font-size:11px;color:var(--tx3);margin-bottom:3px}
.mval{font-size:22px;font-weight:600}
.msub{font-size:11px;color:var(--tx3);margin-top:2px}

/* FORMS */
.frow{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.frow input,.frow select,.frow textarea{width:100%;padding:10px 12px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:14px}
.frow textarea{resize:none;min-height:72px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{padding:10px 18px;border-radius:99px;border:none;font-size:14px;font-weight:500;cursor:pointer}
.btnp{background:var(--pu);color:#fff;width:100%}
.btnp:active{background:var(--pud)}
.btns{padding:5px 12px;font-size:12px;border-radius:99px;border:1px solid var(--bd2);background:var(--bg);color:var(--tx2);cursor:pointer}
.btnd{color:var(--red);border-color:var(--rel)}
.btnw{background:var(--gr);color:#fff;border:none;padding:5px 12px;font-size:12px;border-radius:99px;cursor:pointer}

/* LIST */
.li{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);font-size:14px}
.li:last-child{border-bottom:none}
.bdg{font-size:11px;padding:2px 8px;border-radius:99px;white-space:nowrap}
.bi{background:var(--tel);color:var(--ted)}
.be{background:var(--col);color:var(--cod)}
.bt{background:var(--pul);color:var(--pud)}
.bd_{background:var(--aml);color:var(--amd)}
.bdn{background:var(--grl);color:var(--grd)}
.bdr{background:var(--gyl);color:var(--gyd)}
.bry{background:var(--aml);color:var(--amd)}
.brg{background:var(--grl);color:var(--grd)}

/* SOP */
.sitem{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.sitem:last-child{border-bottom:none}
.sck{width:22px;height:22px;border-radius:6px;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sck.on{background:var(--pu);border-color:var(--pu);color:#fff;font-size:13px;font-weight:700}
.stx.on{text-decoration:line-through;color:var(--tx3)}

/* CALENDAR */
.cnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.chdr{font-size:11px;color:var(--tx3);text-align:center;padding:4px 0}
.cday{font-size:13px;text-align:center;padding:7px 2px;border-radius:6px;cursor:pointer;min-height:34px}
.cday.today{background:var(--pu);color:#fff;font-weight:600}
.cday.hev::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--co);margin:1px auto 0}
.cday.today.hev::after{background:#fff}
.cday.oth{color:var(--tx3)}

/* SHIFT TABLE */
.swrap{overflow-x:auto}
.stbl{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.stbl th,.stbl td{padding:8px 6px;text-align:center;border:1px solid var(--bd)}
.stbl th{background:var(--bg2);font-weight:500;color:var(--tx2)}
.stbl input[type=number]{width:52px;padding:4px;border-radius:4px;border:1px solid var(--bd2);text-align:center;font-size:12px}

/* KANBAN */
.kbl{display:grid;grid-template-columns:1fr;gap:10px}
.kcol{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:12px}
.tcard{background:var(--bg2);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px;font-size:13px}
.tctitle{font-weight:500;margin-bottom:6px}
.tcmeta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* MKTG */
.mcard{border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:10px}
.pub-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;padding:6px 0}
.pub-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pub-box.on{background:var(--gr);border-color:var(--gr);color:#fff;font-size:12px;font-weight:700}

/* TAGS */
.tgsel{display:flex;flex-wrap:wrap;gap:6px}
.tgopt{font-size:12px;padding:4px 12px;border-radius:99px;border:1px solid var(--bd2);cursor:pointer;color:var(--tx2)}
.tgopt.on{background:var(--pu);color:#fff;border-color:var(--pu)}

/* USERS */
.user-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);font-size:13px;flex-wrap:wrap}
.user-row:last-child{border-bottom:none}
.perm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.perm-item{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer}
.perm-cb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.perm-cb.on{background:var(--pu);border-color:var(--pu);color:#fff;font-size:10px}

/* MISC */
.pwrap{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;flex:1}
.pbar{height:100%;background:var(--pu);border-radius:4px}
.empty{text-align:center;color:var(--tx3);font-size:13px;padding:2rem 0}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(20,20,18,.9);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;z-index:9998;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
.section-hdr{font-size:12px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin:16px 0 8px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-size:36px;margin-bottom:8px">🏪</div>
    <div style="font-size:18px;font-weight:600;margin-bottom:4px">森森文具玩具</div>
    <div style="font-size:13px;color:var(--tx3);margin-bottom:1.5rem">管理系統</div>
    <input type="text" id="login-user" placeholder="帳號">
    <input type="password" id="login-pw" placeholder="密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btnp" onclick="doLogin()">登入</button>
    <div id="login-err" style="color:var(--re);font-size:13px;margin-top:10px;display:none">帳號或密碼錯誤</div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div style="font-size:17px;font-weight:600">🏪 森森文具玩具</div>
    <div style="font-size:12px;color:var(--tx3)" id="tlabel"></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="user-badge">
      <span id="user-name-badge"></span>
      <span class="role-tag" id="user-role-badge"></span>
    </div>
    <button class="btns" onclick="syncAll()">↻</button>
    <button class="btns" onclick="doLogout()">登出</button>
  </div>
</div>

<!-- TABBAR -->
<div class="tabbar" id="tabbar"></div>

<!-- PANELS -->
<div id="p-home" class="panel active">
  <div class="metrics">
    <div class="metric"><div class="mlabel">本月收入</div><div class="mval" id="h-inc">—</div></div>
    <div class="metric"><div class="mlabel">本月支出</div><div class="mval" id="h-exp">—</div></div>
    <div class="metric"><div class="mlabel">本月淨額</div><div class="mval" id="h-net">—</div></div>
    <div class="metric"><div class="mlabel">待辦工作</div><div class="mval" id="h-task">—</div><div class="msub">項未完成</div></div>
  </div>
  <div class="card"><div class="ctitle">✅ 今日SOP進度</div><div id="h-sop"></div></div>
  <div class="card"><div class="ctitle">📅 近期活動</div><div id="h-ev"></div></div>
  <div class="card"><div class="ctitle">📋 待辦工作</div><div id="h-tk"></div></div>
</div>

<div id="p-finance" class="panel">
  <div class="card">
    <div class="ctitle">新增記錄</div>
    <div class="frow">
      <div class="fg">
        <select id="f-type"><option value="income">收入</option><option value="expense">支出</option></select>
        <select id="f-cat"><option>銷售收入</option><option>其他收入</option><option>進貨費用</option><option>租金</option><option>水電</option><option>人事薪資</option><option>行銷費用</option><option>雜支</option></select>
      </div>
      <div class="fg">
        <input type="number" id="f-amt" placeholder="金額">
        <input type="date" id="f-dt">
      </div>
      <input type="text" id="f-note" placeholder="備註（選填）">
      <button class="btn btnp" onclick="addFin()">新增記帳</button>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="ctitle" style="margin:0">記帳紀錄</div>
      <select id="f-filter" onchange="renderFin()" style="font-size:12px;padding:4px 8px;border-radius:99px;border:1px solid var(--bd2)">
        <option value="all">全部</option><option value="income">收入</option><option value="expense">支出</option>
      </select>
    </div>
    <div id="fin-list"></div>
  </div>
</div>

<div id="p-tasks" class="panel">
  <div class="card">
    <div class="ctitle">新增工作</div>
    <div class="frow">
      <input type="text" id="t-title" placeholder="工作名稱">
      <div class="fg">
        <select id="t-pri"><option value="high">🔴 急</option><option value="mid" selected>🟡 中</option><option value="low">🟢 低</option></select>
        <input type="date" id="t-due">
      </div>
      <button class="btn btnp" onclick="addTask()">新增</button>
    </div>
  </div>
  <div class="kbl" id="kanban"></div>
</div>

<div id="p-sop" class="panel">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="ctitle" style="margin:0">☀️ 開店清單</div>
      <button class="btns" onclick="resetSOP()">今日重置</button>
    </div>
    <div id="sop-open"></div>
  </div>
  <div class="card"><div class="ctitle">🌙 關店清單</div><div id="sop-close"></div></div>
  <div class="card" id="sop-add-card">
    <div class="ctitle">新增項目</div>
    <div class="frow">
      <select id="s-type"><option value="open">開店</option><option value="close">關店</option></select>
      <input type="text" id="s-txt" placeholder="檢查項目名稱">
      <button class="btn btnp" onclick="addSOP()">新增</button>
    </div>
  </div>
</div>

<div id="p-calendar" class="panel">
  <div class="card">
    <div class="cnav">
      <button class="btns" onclick="calNav(-1)">＜</button>
      <div style="font-size:15px;font-weight:600" id="cal-title"></div>
      <button class="btns" onclick="calNav(1)">＞</button>
    </div>
    <div class="cgrid" id="cal-hdr"></div>
    <div class="cgrid" id="cal-body"></div>
  </div>
  <div class="card" id="ev-add-card">
    <div class="ctitle">新增活動</div>
    <div class="frow">
      <input type="date" id="e-dt">
      <input type="text" id="e-title" placeholder="活動名稱">
      <select id="e-color">
        <option value="#534AB7">紫－促銷活動</option>
        <option value="#1D9E75">綠－進貨</option>
        <option value="#D85A30">橙－課程</option>
        <option value="#378ADD">藍－其他</option>
      </select>
      <button class="btn btnp" onclick="addEv()">新增活動</button>
    </div>
  </div>
  <div class="card"><div class="ctitle">所有活動</div><div id="ev-list"></div></div>
</div>

<div id="p-shift" class="panel">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="ctitle" style="margin:0">本週班表</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btns" onclick="shiftNav(-1)">＜</button>
        <span style="font-size:13px;font-weight:500" id="shift-week-label"></span>
        <button class="btns" onclick="shiftNav(1)">＞</button>
      </div>
    </div>
    <div class="swrap"><table class="stbl" id="shift-tbl"></table></div>
    <div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end" id="shift-save-row"></div>
  </div>
  <div class="card">
    <div class="ctitle">本月時數統計</div>
    <div id="shift-summary"></div>
  </div>
</div>

<div id="p-mktg" class="panel">
  <div class="card" id="mktg-add-card">
    <div class="ctitle">新增行銷內容</div>
    <div class="frow">
      <div class="fg">
        <select id="m-plat"><option>Instagram</option><option>Facebook</option><option>Line</option></select>
        <input type="date" id="m-dt">
      </div>
      <input type="text" id="m-title" placeholder="貼文主題">
      <textarea id="m-content" placeholder="貼文內容草稿..."></textarea>
      <div class="tgsel" id="m-tags">
        <span class="tgopt" onclick="this.classList.toggle('on')">新品上架</span>
        <span class="tgopt" onclick="this.classList.toggle('on')">促銷活動</span>
        <span class="tgopt" onclick="this.classList.toggle('on')">節慶</span>
        <span class="tgopt" onclick="this.classList.toggle('on')">課程</span>
        <span class="tgopt" onclick="this.classList.toggle('on')">日常</span>
      </div>
      <select id="m-status"><option value="draft">草稿</option><option value="ready">待發布</option><option value="posted">已發布</option></select>
      <button class="btn btnp" onclick="addMktg()">儲存</button>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="ctitle" style="margin:0">行銷清單</div>
      <select id="m-filter" onchange="renderMktg()" style="font-size:12px;padding:4px 8px;border-radius:99px;border:1px solid var(--bd2)">
        <option value="all">全部</option><option value="draft">草稿</option><option value="ready">待發布</option><option value="posted">已發布</option>
      </select>
    </div>
    <div id="mktg-list"></div>
  </div>
</div>

<div id="p-users" class="panel">
  <div class="card" id="user-add-card">
    <div class="ctitle">新增使用者</div>
    <div class="frow">
      <div class="fg">
        <input type="text" id="u-name" placeholder="帳號名稱">
        <input type="password" id="u-pw" placeholder="密碼">
      </div>
      <select id="u-role">
        <option value="admin">管理者</option>
        <option value="staff" selected>員工</option>
      </select>
      <div style="font-size:13px;color:var(--tx2);margin-bottom:4px">可使用功能（員工權限）：</div>
      <div class="perm-grid" id="new-user-perms">
        <label class="perm-item"><div class="perm-cb on" data-perm="finance" onclick="toggleNewPerm(this)">✓</div>收支</label>
        <label class="perm-item"><div class="perm-cb on" data-perm="tasks" onclick="toggleNewPerm(this)">✓</div>工作看板</label>
        <label class="perm-item"><div class="perm-cb on" data-perm="sop" onclick="toggleNewPerm(this)">✓</div>SOP清單</label>
        <label class="perm-item"><div class="perm-cb on" data-perm="events" onclick="toggleNewPerm(this)">✓</div>行事曆</label>
        <label class="perm-item"><div class="perm-cb on" data-perm="shifts" onclick="toggleNewPerm(this)">✓</div>班表</label>
        <label class="perm-item"><div class="perm-cb on" data-perm="mktg" onclick="toggleNewPerm(this)">✓</div>行銷</label>
      </div>
      <button class="btn btnp" onclick="addUser()">新增使用者</button>
    </div>
  </div>
  <div class="card">
    <div class="ctitle">使用者清單</div>
    <div id="user-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbzEZAdUh-ucXoJ0UFKZ6WtvpWhNR1ua3whjNnc7R5K_rJa0DnqEf5J_4qZ6BmZ1eC9z/exec';
var DAYS = ['日','一','二','三','四','五','六'];
var cache = {finance:[],tasks:[],sop:[],events:[],shifts:[],mktg:[],users:[]};
var calY, calM, shiftWeekOffset = 0;
var curTab = 'home';
var currentUser = null;

var ALL_TABS = [
  {id:'home', label:'🏠 首頁', perm:'home'},
  {id:'finance', label:'💰 收支', perm:'finance'},
  {id:'tasks', label:'📋 看板', perm:'tasks'},
  {id:'sop', label:'✅ SOP', perm:'sop'},
  {id:'calendar', label:'📅 行事曆', perm:'events'},
  {id:'shift', label:'🕐 班表', perm:'shifts'},
  {id:'mktg', label:'📣 行銷', perm:'mktg'},
  {id:'users', label:'👥 帳號管理', perm:'users'}
];

var ALL_PERMS = ['finance','tasks','sop','events','shifts','mktg'];

function today() { return new Date().toISOString().split('T')[0]; }
function thisM() { return today().slice(0,7); }
function fmtD(d) {
  if (!d) return '—';
  var s = String(d);
  if (s.length >= 10) return s.slice(5,7) + '/' + s.slice(8,10);
  return s;
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

function callApi(action, sheet, extra) {
  var url = API + '?action=' + encodeURIComponent(action) + '&sheet=' + encodeURIComponent(sheet || '');
  if (extra) {
    if (extra.data) url += '&data=' + encodeURIComponent(JSON.stringify(extra.data));
    if (extra.id) url += '&id=' + encodeURIComponent(String(extra.id));
    if (extra.username) url += '&username=' + encodeURIComponent(extra.username);
    if (extra.password) url += '&password=' + encodeURIComponent(extra.password);
  }
  return fetch(url).then(function(r){return r.json();}).catch(function(){return null;});
}

function hasPerm(perm) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  if (perm === 'home') return true;
  return currentUser.perms && currentUser.perms.indexOf(perm) !== -1;
}

function initApp() {
  // Build tabbar based on permissions
  var tabbar = document.getElementById('tabbar');
  tabbar.innerHTML = '';
  var firstTab = null;
  ALL_TABS.forEach(function(tab) {
    if (!hasPerm(tab.perm)) return;
    if (tab.perm === 'users' && currentUser.role !== 'admin') return;
    var el = document.createElement('div');
    el.className = 'tab';
    el.textContent = tab.label;
    el.onclick = (function(t, e) { return function() { sw(t, e); }; })(tab.id, el);
    el.dataset.id = tab.id;
    tabbar.appendChild(el);
    if (!firstTab) firstTab = {id: tab.id, el: el};
  });
  // User badge
  document.getElementById('user-name-badge').textContent = currentUser.username;
  var rb = document.getElementById('user-role-badge');
  rb.textContent = currentUser.role === 'admin' ? '管理者' : '員工';
  rb.className = 'role-tag ' + (currentUser.role === 'admin' ? 'role-admin' : 'role-staff');
  // Admin-only UI
  var isAdmin = currentUser.role === 'admin';
  var adminEls = ['sop-add-card','ev-add-card','mktg-add-card','user-add-card'];
  adminEls.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = isAdmin ? 'block' : 'none';
  });
  // Show first tab
  if (firstTab) sw(firstTab.id, firstTab.el);
  syncAll();
}

function syncAll() {
  toast('同步中...');
  var sheets = ['finance','tasks','sop','events','shifts','mktg'];
  if (currentUser && currentUser.role === 'admin') sheets.push('users');
  Promise.all(sheets.map(function(k) {
    return callApi('getAll', k).then(function(d) {
      if (d && Array.isArray(d)) cache[k] = d;
    });
  })).then(function() {
    renderCur(); toast('同步完成 ✓');
  });
}

function sw(id, el) {
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  var panel = document.getElementById('p-' + id);
  if (panel) panel.classList.add('active');
  if (el) el.classList.add('active');
  curTab = id;
  renderCur();
}

var renders = {

function renderCal(){
  var now=new Date();if(!calY){calY=now.getFullYear();calM=now.getMonth();}
  document.getElementById('cal-title').textContent=calY+' 年 '+(calM+1)+' 月';
  document.getElementById('cal-hdr').innerHTML=DAYS.map(function(d){return '<div class="chdr">'+d+'</div>';}).join('');
  var first=new Date(calY,calM,1).getDay();
  var days=new Date(calY,calM+1,0).getDate();
  var prev=new Date(calY,calM,0).getDate();
  var td=today(); var html='';
  for(var i=0;i<first;i++)html+='<div class="cday oth">'+(prev-first+1+i)+'</div>';
  for(var d=1;d<=days;d++){
    var ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var hev=cache.events.some(function(e){return String(e.date)===ds;});
    html+='<div class="cday'+(ds===td?' today':'')+(hev?' hev':'')+'" onclick="pickDay(\''+ds+'\')">'+d+'</div>';
  }
  var rem=(7-(first+days)%7)%7;
  for(var j=1;j<=rem;j++)html+='<div class="cday oth">'+j+'</div>';
  document.getElementById('cal-body').innerHTML=html;
  renderEvList();
}

// ===== SHIFT (hours-based) =====
function getWeekDates(offset) {
  var now = new Date();
  var mon = new Date(now);
  mon.setDate(now.getDate() - now.getDay() + 1 + offset * 7);
  var week = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(mon); d.setDate(mon.getDate() + i);
    week.push(d.toISOString().split('T')[0]);
  }
  return week;
}
function getUserNames() {
  var names = [];
  cache.users.forEach(function(u) {
    if (String(u.active) === 'true') names.push(String(u.username));
  });
  if (names.length === 0) names = ['老闆'];
  return names;
}
function shiftNav(d) { shiftWeekOffset += d; renderShift(); }
function renderShift() {
  var week = getWeekDates(shiftWeekOffset);
  var label = fmtD(week[0]) + ' ～ ' + fmtD(week[6]);
  document.getElementById('shift-week-label').textContent = label;
  var users = getUserNames();
  var isAdmin = currentUser && currentUser.role === 'admin';
  var html = '<thead><tr><th>員工</th>';
  week.forEach(function(d) {
    html += '<th>' + d.slice(5) + '<br><small style="font-weight:400;color:var(--tx3)">' + DAYS[new Date(d+'T00:00:00').getDay()] + '</small></th>';
  });
  html += '<th>週計</th></tr></thead><tbody>';
  users.forEach(function(uname) {
    html += '<tr><td style="font-weight:500;white-space:nowrap">' + uname + '</td>';
    var weekTotal = 0;
    week.forEach(function(dt) {
      var s = cache.shifts.find(function(s) { return String(s.date) === dt && String(s.username) === uname; });
      var hrs = s ? Number(s.hours) || 0 : 0;
      weekTotal += hrs;
      if (isAdmin) {
        html += '<td><input type="number" min="0" max="24" step="0.5" value="' + (hrs || '') + '" placeholder="0" data-date="' + dt + '" data-user="' + uname + '" onchange="saveShiftCell(this)" style="width:52px;padding:4px;border-radius:4px;border:1px solid var(--bd2);text-align:center;font-size:12px"></td>';
      } else {
        html += '<td style="color:var(--tx2)">' + (hrs > 0 ? hrs + 'h' : '—') + '</td>';
      }
    });
    html += '<td style="font-weight:500">' + (weekTotal > 0 ? weekTotal + 'h' : '—') + '</td></tr>';
  });
  html += '</tbody>';
  document.getElementById('shift-tbl').innerHTML = html;
  renderShiftSummary();
}
function saveShiftCell(input) {
  var dt = input.dataset.date;
  var uname = input.dataset.user;
  var hrs = parseFloat(input.value) || 0;
  var existing = cache.shifts.find(function(s) { return String(s.date) === dt && String(s.username) === uname; });
  if (existing) {
    callApi('update', 'shifts', {id: existing.id, data: {hours: hrs}}).then(function(r) {
      if (r && r.success) { existing.hours = hrs; renderShiftSummary(); toast('已儲存'); }
    });
  } else {
    callApi('add', 'shifts', {data: {date: dt, username: uname, hours: hrs, note: ''}}).then(function(r) {
      if (r && r.success) { cache.shifts.push({id: r.id, date: dt, username: uname, hours: hrs, note: ''}); renderShiftSummary(); toast('已儲存'); }
    });
  }
}
function renderShiftSummary() {
  var m = thisM();
  var users = getUserNames();
  var html = users.map(function(uname) {
    var total = cache.shifts.filter(function(s) { return String(s.date).startsWith(m) && String(s.username) === uname; }).reduce(function(sum, s) { return sum + (Number(s.hours) || 0); }, 0);
    return '<div class="li"><span style="font-weight:500;flex:1">' + uname + '</span><span style="color:var(--tx2)">' + total + ' 小時</span></div>';
  }).join('');
  document.getElementById('shift-summary').innerHTML = html || '<div class="empty">尚無資料</div>';
}

  }).join(''):'<div class="empty">尚無行銷內容</div>';
}

// ===== USERS =====
function toggleNewPerm(el) {
  el.classList.toggle('on');
  el.textContent = el.classList.contains('on') ? '✓' : '';
}
function addUser() {
  var uname = document.getElementById('u-name').value.trim();
  var pw = document.getElementById('u-pw').value;
  var role = document.getElementById('u-role').value;
  if (!uname || !pw) { toast('請填帳號與密碼'); return; }
  var perms = [];
  document.querySelectorAll('#new-user-perms .perm-cb.on').forEach(function(el) { perms.push(el.dataset.perm); });
  if (role === 'admin') perms = ALL_PERMS.concat(['users']);
  callApi('add', 'users', {data: {username: uname, password: pw, role: role, perms: perms.join(','), active: 'true'}}).then(function(r) {
    if (r && r.success) {
      cache.users.push({id: r.id, username: uname, password: pw, role: role, perms: perms.join(','), active: 'true'});
      document.getElementById('u-name').value = ''; document.getElementById('u-pw').value = '';
      toast('已新增使用者'); renderUsers();
    }
  });
}
function toggleUser(id) {
  var u = cache.users.find(function(u) { return u.id === id; });
  if (!u) return;
  var na = String(u.active) !== 'true';
  callApi('update', 'users', {id: id, data: {active: na}}).then(function(r) {
    if (r && r.success) { u.active = na; renderUsers(); toast(na ? '已啟用' : '已停用'); }
  });
}
function delUser(id) {
  if (!confirm('確定要刪除此使用者？')) return;
  callApi('delete', 'users', {id: id}).then(function() {
    cache.users = cache.users.filter(function(u) { return u.id !== id; });
    renderUsers(); toast('已刪除');
  });
}
function renderUsers() {
  var permLabels = {finance:'收支',tasks:'看板',sop:'SOP',events:'行事曆',shifts:'班表',mktg:'行銷'};
  document.getElementById('user-list').innerHTML = cache.users.length ? cache.users.map(function(u) {
    var isActive = String(u.active) === 'true';
    var permsArr = u.role === 'admin' ? ['全功能'] : (String(u.perms||'').split(',').filter(function(p){return p&&permLabels[p];}).map(function(p){return permLabels[p];}));
    return '<div class="user-row"><div style="flex:1"><div style="font-weight:500">'+u.username+'</div><div style="font-size:12px;color:var(--tx3);margin-top:2px">'+( u.role==='admin'?'管理者':'員工')+' · '+permsArr.join('、')+'</div></div><span class="bdg '+(isActive?'bi':'bdr')+'">'+( isActive?'啟用':'停用')+'</span><button class="btns" onclick="toggleUser(\''+u.id+'\')" style="font-size:11px">'+( isActive?'停用':'啟用')+'</button><button class="btns btnd" onclick="delUser(\''+u.id+'\')" style="font-size:11px">刪除</button></div>';
  }).join('') : '<div class="empty">尚無使用者</div>';
}

(function(){
  document.getElementById('tlabel').textContent = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  var now = new Date(); calY = now.getFullYear(); calM = now.getMonth();
  ['f-dt','e-dt','m-dt','t-due'].forEach(function(id){var el=document.getElementById(id);if(el)el.value=today();});
  document.getElementById('login-user').addEventListener('keydown', function(e){if(e.key==='Enter')document.getElementById('login-pw').focus();});
  document.getElementById('login-pw').addEventListener('keydown', function(e){if(e.key==='Enter')doLogin();});
  var saved = sessionStorage.getItem('ss_user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      document.getElementById('login-screen').style.display = 'none';
      initApp();
    } catch(e) { sessionStorage.removeItem('ss_user'); }
  }
})();
